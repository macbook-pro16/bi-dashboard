<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BIダッシュボード - アプリを開く</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      box-sizing: border-box;
    }
    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      padding: 32px 24px;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #0f172a;
      margin: 0 0 8px 0;
    }
    p {
      font-size: 14px;
      color: #64748b;
      line-height: 1.6;
      margin: 0 0 24px 0;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 12px;
      box-sizing: border-box;
      transition: background 0.2s;
    }
    .btn-primary {
      background: #6366f1;
      color: white;
      border: none;
    }
    .btn-primary:hover {
      background: #4f46e5;
    }
    .btn-secondary {
      background: white;
      color: #334155;
      border: 1px solid #e2e8f0;
    }
    .btn-secondary:hover {
      background: #f8fafc;
    }
    .copy-hint {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 16px;
    }
  </style>
  <script>
    function getPlatform() {
      const ua = navigator.userAgent.toLowerCase();
      if (/android/.test(ua)) return 'android';
      if (/iphone|ipad|ipod/.test(ua)) return 'ios';
      return 'other';
    }

    function getChromeIntentUrl() {
      // 本番URL: https://s-truck.co.jp/dashboard に飛ばす
      return 'intent://s-truck.co.jp/dashboard#Intent;scheme=https;package=com.android.chrome;end';
    }

    function openInChrome() {
      const platform = getPlatform();
      if (platform === 'android') {
        // Android: intentでChromeを起動
        window.location.href = getChromeIntentUrl();
      } else if (platform === 'ios') {
        // iOS: SafariではService Workerが動くので、直接/dashboardを開くことを促す
        // ただし、ここでは単にSafariで開くことを推奨（直接Safariを起動することはできない）
        alert('Safariで開いてください。');
        // クリップボードにURLをコピーするボタンなどを用意しても良い
        navigator.clipboard.writeText('https://s-truck.co.jp/dashboard').then(() => {
          alert('URLをコピーしました。Safariで開いてください。');
        });
      } else {
        window.open('https://s-truck.co.jp/dashboard', '_blank');
      }
    }

    function copyUrl() {
      navigator.clipboard.writeText('https://s-truck.co.jp/dashboard').then(() => {
        alert('URLをコピーしました！\nChromeまたはSafariに貼り付けて開いてください。');
      });
    }
  </script>
</head>
<body>
  <div class="card">
    <div class="icon">📊</div>
    <h1>BIダッシュボード</h1>
    <p>
      このアプリは<strong>Google Chrome</strong>（Android）または<strong>Safari</strong>（iPhone/iPad）で開く必要があります。<br>
      以下のボタンから開いてください。
    </p>
    <a href="#" class="btn btn-primary" onclick="openInChrome(); return false;">
      Chrome で開く
    </a>
    <a href="#" class="btn btn-secondary" onclick="copyUrl(); return false;">
      URLをコピー
    </a>
    <div class="copy-hint">
      ※自動で開かない場合は、Chromeを起動して<br>「https://s-truck.co.jp/dashboard」にアクセスしてください。
    </div>
  </div>
</body>
</html>
