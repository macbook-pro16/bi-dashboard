<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIダッシュボードを開く</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 16px; background: #f1f5f9; }
    .card { background: white; padding: 32px 24px; border-radius: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.06); text-align: center; max-width: 380px; width: 100%; }
    h1 { font-size: 22px; font-weight: 700; color: #0f172a; margin: 0 0 12px; }
    p { font-size: 14px; color: #475569; margin: 0 0 24px; line-height: 1.5; }
    .btn { display: block; width: 100%; padding: 14px 18px; border-radius: 14px; font-size: 16px; font-weight: 600; text-decoration: none; text-align: center; margin-bottom: 12px; box-sizing: border-box; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-success { background: #10b981; color: white; }
    .btn-secondary { background: #e2e8f0; color: #334155; }
    .note { font-size: 12px; color: #94a3b8; line-height: 1.6; margin-top: 20px; }
    a { color: #6366f1; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📊 BIダッシュボード</h1>
    <p>このアプリは <strong>Google Chrome</strong>（Android）または <strong>Safari</strong>（iPhone/iPad）でご利用ください。</p>

    <!-- Android用：PlayストアのChromeページを開く -->
    <a href="https://play.google.com/store/apps/details?id=com.android.chrome" class="btn btn-primary" target="_blank" rel="noopener noreferrer">
      Chrome を開く (Android)
    </a>

    <!-- iPhone/その他用：ダッシュボードを直接Safariで開く（Safariが起動することを期待） -->
    <a href="https://bi-dashboard-phi-five.vercel.app/dashboard" class="btn btn-success" target="_blank" rel="noopener noreferrer">
      ダッシュボードを開く
    </a>

    <p class="note">
      ※ 自動でSafariが開かない場合は、上記の「ダッシュボードを開く」を<strong>長押し</strong>して「リンクを開く」を選ぶか、<br>
      手動でSafariを起動し、以下のURLにアクセスしてください：<br>
      <span style="font-size:11px; word-break:break-all;">https://bi-dashboard-phi-five.vercel.app/dashboard</span>
    </p>
  </div>
</body>
</html>
