<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BIダッシュボード - アプリを開く</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; padding: 32px 24px; border-radius: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.06); text-align: center; max-width: 380px; width: 100%; }
    h1 { font-size: 22px; font-weight: 700; color: #0f172a; margin: 0 0 12px; }
    p { font-size: 14px; color: #475569; margin: 0 0 24px; line-height: 1.5; }
    .btn { display: block; width: 100%; padding: 14px 18px; border-radius: 14px; font-size: 16px; font-weight: 600; text-decoration: none; text-align: center; border: none; cursor: pointer; margin-bottom: 12px; background: none; font-family: inherit; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:active { background: #4f46e5; }
    .btn-secondary { background: #e2e8f0; color: #334155; }
    .btn-secondary:active { background: #cbd5e1; }
    .text-small { font-size: 12px; color: #94a3b8; line-height: 1.6; margin-top: 20px; }
    a { color: #6366f1; }
  </style>
  <script>
    const DASHBOARD_URL = 'https://bi-dashboard-phi-five.vercel.app/dashboard';
    const PLAY_STORE_CHROME = 'https://play.google.com/store/apps/details?id=com.android.chrome';

    function tryOpenChrome() {
      // まず intent スキームを試す（即座に戻ってくるので待ち受けできない）
      window.location.href = 'intent://bi-dashboard-phi-five.vercel.app/dashboard#Intent;scheme=https;package=com.android.chrome;end';
      
      // 1.5秒後に Google Play ストアの Chrome ページへフォールバック
      setTimeout(function() {
        window.location.href = PLAY_STORE_CHROME;
      }, 1500);
    }

    function copyUrl() {
      navigator.clipboard.writeText(DASHBOARD_URL).then(function() {
        alert('URLをコピーしました。\nChrome または Safari に貼り付けて開いてください。');
      }).catch(function() {
        prompt('以下のURLをコピーしてください', DASHBOARD_URL);
      });
    }
  </script>
</head>
<body>
  <div class="card">
    <h1>📊 BIダッシュボード</h1>
    <p>このアプリは <strong>Google Chrome</strong>（Android）または <strong>Safari</strong>（iPhone/iPad）でご利用ください。</p>
    <button class="btn btn-primary" onclick="tryOpenChrome()">Chrome で開く</button>
    <button class="btn btn-secondary" onclick="copyUrl()">URLをコピー</button>
    <p class="text-small">
      ※「Chromeで開く」ボタンが反応しない場合は、<br>
      手動で Chrome を起動し、<br>
      <a href="https://bi-dashboard-phi-five.vercel.app/dashboard">ダッシュボード</a> にアクセスしてください。
    </p>
  </div>
</body>
</html>
