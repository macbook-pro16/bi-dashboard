<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIダッシュボードを開く</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin:0; background:#f1f5f9; }
    .card { background: white; padding: 32px 24px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; max-width: 360px; width: 100%; margin: 16px; }
    .btn { display: block; width: 100%; margin: 10px 0; padding: 16px; border-radius: 14px; font-weight: 600; font-size: 16px; text-decoration: none; border: none; cursor: pointer; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-secondary { background: #e2e8f0; color: #334155; }
    .text-small { font-size: 12px; color: #64748b; margin-top: 16px; line-height: 1.5; }
  </style>
</head>
<body>
<div class="card">
  <h2 style="margin:0 0 8px; font-size:22px;">📊 BIダッシュボード</h2>
  <p style="font-size:14px; color:#475569; margin:0 0 20px;">このアプリは <strong>Google Chrome</strong> で開く必要があります。</p>
  <button id="chrome-btn" class="btn btn-primary">Chromeで開く</button>
  <button id="copy-btn" class="btn btn-secondary">URLをコピー</button>
  <p class="text-small">※「Chromeで開く」ボタンが反応しない場合は、<br>手動でChromeを起動し、<br>「bi-dashboard-phi-five.vercel.app/dashboard」<br>にアクセスしてください。</p>
</div>
<script>
  const DASHBOARD_URL = 'https://bi-dashboard-phi-five.vercel.app/dashboard';
  const PLAY_STORE_CHROME = 'https://play.google.com/store/apps/details?id=com.android.chrome';

  document.getElementById('chrome-btn').addEventListener('click', function() {
    // まず intent を試す（一部のブラウザでは有効）
    window.location.href = 'intent://bi-dashboard-phi-five.vercel.app/dashboard#Intent;scheme=https;package=com.android.chrome;end';
    // 1.5秒後にGoogle PlayストアのChromeページへフォールバック
    setTimeout(function() {
      window.location.href = PLAY_STORE_CHROME;
    }, 1500);
  });

  document.getElementById('copy-btn').addEventListener('click', function() {
    navigator.clipboard.writeText(DASHBOARD_URL).then(function() {
      alert('URLをコピーしました。\nChromeに貼り付けて開いてください。');
    });
  });
</script>
</body>
</html>
