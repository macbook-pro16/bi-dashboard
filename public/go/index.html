<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIダッシュボードを開く</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 16px; background: #f1f5f9; }
    .card { background: white; padding: 32px 24px; border-radius: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.06); text-align: center; max-width: 380px; width: 100%; }
    h1 { font-size: 22px; font-weight: 700; color: #0f172a; margin: 0 0 12px; }
    .step { background: #f8fafc; border-radius: 12px; padding: 16px; margin: 16px 0; text-align: left; }
    .btn { display: block; width: 100%; padding: 14px; border-radius: 14px; font-size: 16px; font-weight: 600; text-decoration: none; text-align: center; margin-bottom: 12px; }
    .btn-blue { background: #6366f1; color: white; }
    .btn-green { background: #10b981; color: white; }
    .url { background: #e2e8f0; padding: 8px 12px; border-radius: 8px; word-break: break-all; font-size: 12px; color: #334155; margin: 8px 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📊 BIダッシュボード</h1>
    <p style="font-size:14px; color:#475569; margin:0 0 8px;">
      このアプリは <strong>Safari</strong>（iPhone）または <strong>Google Chrome</strong>（Android）でご利用ください。
    </p>
    
    <div class="step">
      <p style="font-weight:600; margin:0 0 8px;">📱 iPhone で開く手順</p>
      <ol style="margin:0; padding-left:20px; font-size:14px; color:#334155;">
        <li style="margin-bottom:6px;">下に表示されているURLを <strong>長押し</strong> してコピーします。</li>
        <li style="margin-bottom:6px;">ホーム画面に戻り、<strong>Safari</strong> を起動します。</li>
        <li style="margin-bottom:6px;">アドレスバーに貼り付けて、ダッシュボードを開きます。</li>
      </ol>
    </div>

    <div class="url">https://bi-dashboard-phi-five.vercel.app/dashboard</div>

    <a href="https://play.google.com/store/apps/details?id=com.android.chrome" class="btn btn-blue" target="_blank" rel="noopener noreferrer">
      Android の方はこちら
    </a>
    <p style="font-size:12px; color:#94a3b8; margin-top:16px;">
      ※ 開いた後、共有メニューから「ホーム画面に追加」すると、次回からアプリのように使えます。
    </p>
  </div>
</body>
</html>
